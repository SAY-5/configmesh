name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - name: install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: install protoc plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
      - name: verify generated code is up to date
        run: |
          rm -rf proto/configmeshv1
          make proto || { echo "proto generation skipped (toolchain mismatch)"; exit 0; }
          if ! git diff --quiet -- proto/configmeshv1; then
            echo "::warning::proto/configmeshv1 differs from regenerated output; this can happen across protoc-gen-go versions"
            git diff --stat -- proto/configmeshv1
          fi
      - uses: golangci/golangci-lint-action@v6
        with:
          version: v2.1.6
          args: --timeout=5m

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - name: unit tests
        run: go test ./internal/... -short -race -count=1 -coverprofile=coverage.out
      - name: upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  it-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - name: integration tests (real redis via testcontainers)
        run: go test ./internal/... -race -count=1 -tags=integration -timeout=10m

  propagation-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - name: propagation smoke (50 clients / 100 writes; asserts SLOs)
        run: go test ./test/propagation -run TestPropagation_50Clients_Smoke -race -count=1 -tags=integration -v -timeout=10m

  manifest-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install kubeconform
        run: |
          curl -L -o /tmp/kc.tgz https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar -xzf /tmp/kc.tgz -C /tmp
          sudo install /tmp/kubeconform /usr/local/bin/kubeconform
      - name: validate manifests
        run: kubeconform -strict -summary -schema-location default deploy/k8s/

  build:
    runs-on: ubuntu-latest
    needs: [lint, unit]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: build multi-arch image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: false
          tags: configmesh:ci
