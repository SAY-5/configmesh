apiVersion: v1
kind: Namespace
metadata:
  name: configmesh
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: configmesh
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
      name: redis
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: configmesh
spec:
  serviceName: redis
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args: ["redis-server", "--save", "", "--appendonly", "no"]
          ports:
            - containerPort: 6379
              name: redis
          readinessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: configmesh
  namespace: configmesh
spec:
  selector:
    app: configmesh
  ports:
    - port: 9090
      targetPort: 9090
      name: grpc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: configmesh
  namespace: configmesh
spec:
  replicas: 2
  selector:
    matchLabels:
      app: configmesh
  template:
    metadata:
      labels:
        app: configmesh
    spec:
      containers:
        - name: configmesh
          image: ghcr.io/say-5/configmesh:latest
          imagePullPolicy: IfNotPresent
          args: ["-listen=:9090", "-redis=redis.configmesh.svc.cluster.local:6379"]
          ports:
            - containerPort: 9090
              name: grpc
          env:
            - name: CONFIGMESH_LISTEN
              value: ":9090"
            - name: CONFIGMESH_REDIS_ADDR
              value: "redis.configmesh.svc.cluster.local:6379"
          readinessProbe:
            tcpSocket:
              port: 9090
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
